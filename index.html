let veganOnly = false;

// 🌱 비건 토글
function toggleVegan() {
    veganOnly = !veganOnly;
    document.querySelector(".toggle").innerText =
        "🥗 비건 동행: " + (veganOnly ? "ON" : "OFF");
}

// 🎯 랜덤 선택
function pickMenu() {
    const rolling = document.getElementById("rolling");
    const result = document.getElementById("result");

    let filtered = veganOnly
        ? menuData.filter(m => m.vegan)
        : menuData;

    if (filtered.length === 0) {
        result.innerText = "❌ 선택 가능한 메뉴 없음";
        return;
    }

    let count = 0;

    const interval = setInterval(() => {
        const temp = filtered[Math.floor(Math.random() * filtered.length)];
        rolling.innerText = `고양이 고민중... 🐾 ${temp.name} - ${temp.menu}`;
        count++;

        if (count > 15) {
            clearInterval(interval);
            const pick = filtered[Math.floor(Math.random() * filtered.length)];
            result.innerText = `🐱 오늘의 선택 → ${pick.name} (${pick.menu})`;
            rolling.innerText = "";
        }
    }, 100);
}
